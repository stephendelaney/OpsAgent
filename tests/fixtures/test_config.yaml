# Test Configuration for OpsAgent

aws:
  region: "us-east-1"
  ssm_enabled: false
  secrets_manager:
    enabled: false

ec2:
  connection_timeout: 30
  command_timeout: 300
  ssh:
    port: 22
    username: "ec2-user"
    key_path: "/tmp/test-key.pem"

efs:
  mount_point: "/mnt/efs"
  logs_path: "/mnt/efs/logs"
  heap_dumps_path: "/mnt/efs/heap-dumps"
  max_log_size_mb: 500
  max_heap_dump_size_mb: 2048

java_node:
  restart_script: "/opt/java-app/bin/restart.sh"
  expected_port: 8080
  health_check_url: "http://localhost:8080/health"
  health_check_interval: 5

log_collection:
  patterns:
    - "*.log"
    - "gc.log*"
  exclude_patterns:
    - "*.gz"
  max_age_days: 7

heap_dump_collection:
  patterns:
    - "*.hprof"
  max_files: 2

llm:
  provider: "anthropic"
  anthropic:
    model: "claude-sonnet-4-5-20250929"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 16000
    temperature: 0.3

alert_handler:
  monit:
    webhook_port: 8000
    webhook_path: "/monit-webhook"
    authentication: false

notifications:
  slack:
    enabled: false
  pagerduty:
    enabled: false

recovery:
  auto_restart: false
  max_restart_attempts: 3
  restart_delay: 30
  create_incident_report: true
  incident_report_path: "/tmp/test-incidents"

logging:
  level: "DEBUG"
  format: "json"
  console_output: true
  file: "/tmp/ops-agent-test.log"
